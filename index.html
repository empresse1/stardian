<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stardian | The Ascendant Matrix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
        }

        #cover-section {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #cover-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .scroll-hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #C5A059;
            font-family: serif;
            letter-spacing: 4px;
            font-size: 11px;
            text-transform: uppercase;
            z-index: 10;
        }
    </style>
</head>
<body>

    <section id="cover-section">
        <img src="cover.png" id="cover-image" alt="Stardian Portal">
        <div class="scroll-hint">Scroll to Ascend</div>
    </section>

</body>
</html>
