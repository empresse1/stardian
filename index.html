<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stardian | The Ascendant Matrix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000; /* Keeps the edges clean */
            overflow-x: hidden;
        }

        #cover-section {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            background-color: #000;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        /* This ensures the image covers the screen perfectly */
        #cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: center;
        }

        .scroll-prompt {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: #C5A059;
            font-family: serif;
            letter-spacing: 5px;
            font-size: 12px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); /* Makes text pop against marble */
        }

        #main-content {
            background-color: #000;
            min-height: 200vh;
            padding-top: 100vh;
        }
    </style>
</head>
<body>

    <section id="cover-section">
        <img src="./cover.png" id="cover-image" alt="Stardian">
        <div class="scroll-prompt">Scroll to Ascend</div>
    </section>

    <div id="main-content"></div>

    <script>
        window.addEventListener('scroll', function() {
            const cover = document.getElementById('cover-section');
            if (window.scrollY > 20) {
                cover.style.transform = 'translateY(-100%)';
            } else {
                cover.style.transform = 'translateY(0)';
            }
        });
    </script>
</body>
</html>
